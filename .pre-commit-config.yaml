repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        verbose: true

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path ccturn/Cargo.toml --all -- --check
        language: system
        files: ^ccturn/.*\.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path ccturn/Cargo.toml --all-targets -- -D warnings
        language: system
        files: ^ccturn/.*\.(rs|toml)$
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --manifest-path ccturn/Cargo.toml
        language: system
        files: ^ccturn/.*\.(rs|toml)$
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit
        entry: cargo audit --no-fetch --file ccturn/Cargo.lock
        language: system
        files: ^ccturn/Cargo\.lock$
        pass_filenames: false
